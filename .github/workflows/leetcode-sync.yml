name: Sync LeetCode

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set Git identity
        run: |
          git config --global user.name "AyushSingh360"
          git config --global user.email "ayushsingh21109@gmail.com"
          
      - name: Sync accepted submissions
        uses: joshcai/leetcode-sync@master
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: leetcode
          verbose: true
          commit-header: "[LeetCode Sync]"

      - name: Checkout repository to build index
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Auto-Format Code (Prettier, Black, Clang)
        run: |
          # Install formatters
          sudo apt-get update && sudo apt-get install -y clang-format
          pip install black
          npm install -g prettier

          # Format Python
          black leetcode/ || true

          # Format C++, C, and Java
          find leetcode/ -type f \( -name "*.cpp" -o -name "*.c" -o -name "*.java" \) -exec clang-format -style=Google -i {} + || true

          # Format JS, TS, and Markdown
          prettier --write "leetcode/**/*.{js,ts,md}" || true

      - name: Build Problem Index
        run: python .scripts/build_index.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "AyushSingh360"
          git config --global user.email "ayushsingh21109@gmail.com"
          git add README.md
          git commit -m "docs: auto-update algorithm index [skip ci]" || echo "No changes to commit"
          git push
